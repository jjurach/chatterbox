# Example Mellona Configuration for Chatterbox

## Local-Only Configuration (FasterWhisper + Piper)
# Use this for development and privacy-critical applications with no cloud dependencies

# providers:
#   faster_whisper:
#     model: base              # tiny, base, small, medium, large
#     device: cpu              # cpu or cuda for GPU
#   piper:
#     voice: en_US-lessac-medium
